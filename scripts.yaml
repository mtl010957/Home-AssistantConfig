sw_blinds_block_afternoon_sun:
  alias: West Blinds Block Afternoon Sun
  sequence:
  - data:
      tilt_position: 100
    target:
      entity_id: cover.family_room_w_blinds
    action: cover.set_cover_tilt_position
  mode: single
  icon: mdi:blinds-horizontal-closed
  description: ''
